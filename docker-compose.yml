services:
  # ── PostgreSQL with pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon
      POSTGRES_DB: archon
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./scripts/seed-embeddings.sql:/docker-entrypoint-initdb.d/seed-embeddings.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon -d archon"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python MCP diagram server ─────────────────────────────────────────────
  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    volumes:
      - diagrams_tmp:/tmp
    expose:
      - "8000"

  # ── Next.js application ───────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MCP_SERVER_URL: "http://mcp:8000/mcp"
      DIAGRAM_OUTPUT_DIR: "/tmp/archon-diagrams"
      DATABASE_URL: "postgresql://archon:archon@postgres:5432/archon"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
    volumes:
      - diagrams_tmp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      mcp:
        condition: service_started

volumes:
  diagrams_tmp:
  postgres_data:
