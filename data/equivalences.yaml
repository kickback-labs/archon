# Cross-provider service equivalences
#
# Used by the retrieval pipeline when assembling context, regardless of tier.
# For every doc entering context (tier-1 injection or tier-2/3 retrieval), the
# pipeline looks up (provider + service) here and appends a short footer:
#
#   > Equivalent to: <other providers' services> (<level> equivalence)
#   > Note: <note>  ← only present when level is "medium"
#
# The lookup is keyed on (provider, service). The pipeline ignores entries
# whose tier does not match the doc being injected — the tier field is present
# for transparency and future use (e.g. reranker hints), not for filtering.
#
# Equivalence levels:
#   high   — nearly identical in function, model, and architecture.
#   medium — same end goal but meaningful architectural differences;
#            the agent must reason about the trade-offs.

